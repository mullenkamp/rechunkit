site_name: rechunkit
site_description: Functions to efficiently rechunk multidimensional arrays
site_url: https://mullenkamp.github.io/rechunkit/

repo_url: https://github.com/mullenkamp/rechunkit
repo_name: mullenkamp/rechunkit

theme:
    name: material
    icon:
        logo: material/library
    palette:
        # Palette toggle for light mode
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: blue
          accent: teal
          toggle:
            icon: material/brightness-7
            name: Switch to dark mode

        # Palette toggle for dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: blue
          accent: teal
          toggle:
            icon: material/brightness-4
            name: Switch to light mode

    features:
        - navigation.sections
        - navigation.expand
        - navigation.top
        - content.code.copy
        - toc.follow

markdown_extensions:
    - toc:
        permalink: true
    - admonition
    - pymdownx.details
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.tasklist:
        custom_checkbox: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.tabbed:
        alternate_style: true

plugins:
    - search
    - mkdocstrings:
        handlers:
            python:
                inventories:
                    - https://docs.python.org/3.11/objects.inv
                    - https://numpy.org/doc/stable/objects.inv
                options:
                    docstring_style: numpy
                    show_root_heading: true
                    show_source: false
                    show_if_no_docstring: false

watch:
    - docs
    - rechunkit

nav:
    - Home: index.md
    - Getting Started:
        - Installation: getting-started/installation.md
        - Quick Start: getting-started/quickstart.md
    - User Guide:
        - Preprocessing Tools: guide/preprocessing.md
        - Rechunking: guide/rechunking.md
        - Integration: guide/integration.md
    - Concepts:
        - How It Works: concepts/how-it-works.md
        - Composite Numbers: concepts/composite-numbers.md
        - Optimization Internals: concepts/optimization-internals.md
    - API Reference:
        - Overview: reference/index.md
        - rechunkit: reference/rechunkit.md
